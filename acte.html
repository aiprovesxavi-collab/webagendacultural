<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acte · Agenda Cultural de Catalunya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --tinta:#16130f; --gris:#6b6359; --paper:#ffffff; --fons:#fafafa;
  --vora:#ececec; --c-musicals:#f0820a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--paper);color:var(--tinta);line-height:1.5;-webkit-font-smoothing:antialiased}
.detall{max-width:820px;margin:0 auto;padding:1.4rem 1.5rem 5rem}
.tornar{background:none;border:none;color:var(--tinta);font-family:'Outfit',sans-serif;font-weight:600;
  font-size:.95rem;cursor:pointer;padding:.6rem 0;display:inline-flex;align-items:center;gap:.4rem}
.tornar:hover{color:var(--c-musicals)}
.foto-gran{width:100%;aspect-ratio:16/9;border-radius:18px;background:var(--fons);background-size:cover;
  background-position:center;margin:.5rem 0 1.5rem;box-shadow:0 10px 30px rgba(0,0,0,.14)}
.d-data{font-family:'Outfit',sans-serif;font-weight:600;color:var(--c-musicals);text-transform:uppercase;
  letter-spacing:.05em;font-size:.95rem}
h1{font-family:'Cinzel',serif;font-weight:700;font-size:clamp(1.6rem,4vw,2.6rem);line-height:1.15;
  margin:.5rem 0;letter-spacing:.02em}
.d-meta{display:flex;flex-wrap:wrap;gap:.6rem;margin:1.2rem 0}
.chip{background:var(--fons);border:1px solid var(--vora);border-radius:30px;padding:.45rem .95rem;
  font-size:.88rem;font-weight:500;display:inline-flex;align-items:center;gap:.4rem}
.chip.gratis{background:#e9f9f0;border-color:#bfe9d2;color:#1aa179}
.chip-mapa{text-decoration:none;color:var(--tinta);cursor:pointer;transition:all .2s}
.chip-mapa:hover{border-color:var(--c-musicals);color:var(--c-musicals);background:#fff7ef}
.chip-mapa .anar{color:var(--c-musicals);font-weight:600}
.d-font{margin-top:1.6rem;padding-top:1rem;border-top:1px solid var(--vora);font-size:.85rem;color:var(--gris);font-weight:500}
.d-artistes{font-family:'Outfit',sans-serif;font-size:.95rem;color:var(--tinta);font-weight:500;margin:.4rem 0}
.d-descripcio{font-family:'Cormorant Garamond',serif;font-size:1.25rem;line-height:1.7;color:#2a2620;margin:1.4rem 0;white-space:pre-line}
.d-saber{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.15rem;line-height:1.6;color:var(--gris);
  border-left:3px solid var(--c-musicals);padding:.4rem 0 .4rem 1rem;margin:1.4rem 0;background:linear-gradient(90deg,rgba(240,130,10,.04),transparent)}
.d-saber::before{content:"Sabies que… ";font-style:normal;font-weight:600;color:var(--c-musicals)}
.d-enllac{display:inline-block;margin-top:1rem;background:var(--tinta);color:#fff;text-decoration:none;
  padding:.85rem 1.6rem;border-radius:12px;font-family:'Outfit',sans-serif;font-weight:600;transition:transform .2s}
.d-enllac:hover{transform:translateY(-2px)}
.estat{text-align:center;color:var(--gris);padding:4rem 1.5rem;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.3rem}
</style>
</head>
<body>

<div class="detall">
  <a class="tornar" href="index.html">← Tornar als actes</a>
  <div id="contingut"><div class="estat">Carregant l'acte…</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
<script>
const SUPABASE_URL = "https://gdxucdxoclgrcjtciggs.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkeHVjZHhvY2xncmNqdGNpZ2dzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDg1MTksImV4cCI6MjA5NTcyNDUxOX0.DSsGzop1xXmMY1ztYTr9cPWOi_KPcRZN0ze_rP5pYqs";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }
});

const IMG_CAT = {
  "Arts escèniques":"imatges/esceniques.jpg","Dansa":"imatges/dansa.jpg",
  "Arts musicals":"imatges/musicals.jpg","Arts plàstiques":"imatges/plastiques.jpg",
  "Cultura popular":"imatges/popular.jpg","Literatura":"imatges/literatura.jpg",
  "Conferències":"imatges/conferencies.jpg","Cinema":"imatges/cinema.jpg",
  "Formació":"imatges/formacio.jpg","Altres":"imatges/altres.jpg"
};
function fmtData(d){
  if(!d) return "Data per confirmar";
  return new Date(d).toLocaleDateString('ca-ES',{weekday:'long',day:'numeric',month:'long'});
}
function fmtHora(h){
  if(!h) return "";
  const m=h.match(/(\d{1,2})\s*[:.h]?\s*(\d{2})?/);
  if(!m) return "";
  let hh=parseInt(m[1],10); if(hh<0||hh>23) return "";
  return String(hh).padStart(2,'0')+":"+(m[2]||"00");
}
function fmtDataHora(d,h){const data=fmtData(d);const hora=fmtHora(h);return hora?`${data} · ${hora}`:data;}
function categoriesActe(a){
  const c=new Set();
  (a.categories||[]).forEach(x=>{ if(x && x.categoria) c.add(x.categoria); });
  return [...c];
}
let SUB_IMG = {};
// imatge de reserva (sempre al nostre servidor): subcategoria -> categoria -> altres
function imatgeReserva(a){
  for(const p of (a.categories||[])){
    if(p && p.categoria && p.subcategoria){
      const fitxer = SUB_IMG[p.categoria + "|" + p.subcategoria];
      if(fitxer) return "categoria/" + fitxer;
    }
  }
  const cats=categoriesActe(a);
  if(cats.length && IMG_CAT[cats[0]]) return IMG_CAT[cats[0]];
  return "imatges/altres.jpg";
}
function imatgePropia(a){ return a.imatge || null; }
function imatgeActe(a){ return imatgeReserva(a); }
// prova la imatge pròpia (externa) amb límit de temps; si carrega, substitueix el fons
function provaImatgePropia(el, url, msTimeout){
  if(!url || !el) return;
  const img = new Image();
  let fet = false;
  const timer = setTimeout(()=>{ if(!fet){ fet=true; img.src=""; } }, msTimeout||4000);
  img.onload = ()=>{ if(!fet){ fet=true; clearTimeout(timer); el.style.backgroundImage = `url('${url}')`; } };
  img.onerror = ()=>{ if(!fet){ fet=true; clearTimeout(timer); } };
  img.src = url;
}

async function carrega(){
  const params = new URLSearchParams(location.search);
  const id = params.get("id");
  if(!id){ document.getElementById("contingut").innerHTML='<div class="estat">No s\'ha indicat cap acte.</div>'; return; }

  const {data, error} = await sb.from("actes_publicada").select("*").eq("id", id).single();

  if(error || !data){
    document.getElementById("contingut").innerHTML='<div class="estat">No s\'ha trobat l\'acte.</div>';
    return;
  }
  // carrega el mapa de subcategories (imatge) abans de pintar
  // carrega subcategories i categories (per creuar-les sense joins)
  const [rSubs, rCats] = await Promise.all([
    sb.from("subcategories").select("nom,imatge,categoria_id"),
    sb.from("categories").select("id,nom"),
  ]);
  const catPerId = {};
  (rCats.data||[]).forEach(c=>{ catPerId[c.id]=c.nom; });
  SUB_IMG = {};
  (rSubs.data||[]).forEach(s=>{
    if(!s.imatge) return;
    const catNom = catPerId[s.categoria_id] || "";
    SUB_IMG[catNom + "|" + s.nom] = s.imatge;
  });
  pinta(data);
}

function pinta(a){
  document.title = (a.nom||"Acte") + " · Agenda Cultural";
  const lloc=[a.lloc_nom, a.municipi||""].filter(Boolean).join(", ");
  const cats=categoriesActe(a);

  // ---- lloc clicable cap a Google Maps (com anar-hi) ----
  // si tenim coordenades, fem servir la ruta amb destinació exacta;
  // si no, cerquem el text del lloc + municipi a Google Maps.
  let mapaUrl = "";
  if(a.latitud && a.longitud){
    mapaUrl = `https://www.google.com/maps/dir/?api=1&destination=${a.latitud},${a.longitud}`;
  } else if(lloc){
    mapaUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent([a.lloc_nom,a.adreca,a.municipi].filter(Boolean).join(", "))}`;
  }

  let meta="";
  if(lloc){
    meta += mapaUrl
      ? `<a class="chip chip-mapa" href="${mapaUrl}" target="_blank" rel="noopener" title="Com arribar-hi">📍 ${lloc} <span class="anar">· com anar-hi ↗</span></a>`
      : `<span class="chip">📍 ${lloc}</span>`;
  }
  if(a.preu_gratuit===true) meta+=`<span class="chip gratis">Gratuït</span>`;
  else if(a.preu) meta+=`<span class="chip">${a.preu}</span>`;
  if(a.idioma) meta+=`<span class="chip">${a.idioma}</span>`;
  if(a.public_desti) meta+=`<span class="chip">${a.public_desti}</span>`;
  if(cats.length) meta+=`<span class="chip">${cats.join(" · ")}</span>`;

  const url = a.enllac;
  const enllacHtml = (url && url.startsWith("http"))
    ? `<a class="d-enllac" href="${url}" target="_blank" rel="noopener">Més informació i entrades</a>` : "";

  // ---- font de l'acte (d'on prové la informació) ----
  const fonts = Array.isArray(a.fonts) ? a.fonts : [];
  const fontHtml = fonts.length
    ? `<div class="d-font">Font: ${fonts.join(" · ")}</div>` : "";

  document.getElementById("contingut").innerHTML = `
    <div class="foto-gran" style="background-image:url('${imatgeActe(a)}')"></div>
    <div class="d-data">${a.data_text || fmtDataHora(a.data_inici, a.horari_text)}</div>
    <h1>${a.nom||"Acte sense títol"}</h1>
    <div class="d-meta">${meta}</div>
    ${a.artistes?`<div class="d-artistes">Amb: ${a.artistes}</div>`:""}
    <div class="d-descripcio">${a.descripcio_net || ""}</div>
    ${a.a_saber?`<div class="d-saber">${a.a_saber}</div>`:""}
    ${enllacHtml}
    ${fontHtml}
  `;
  // xarxa de seguretat: prova la imatge pròpia (externa); si falla/triga, queda la de reserva
  const elFoto = document.querySelector(".foto-gran");
  provaImatgePropia(elFoto, imatgePropia(a), 4000);
}

carrega();
</script>
</body>
</html>
