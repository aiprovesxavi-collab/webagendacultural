<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Cultural de Catalunya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --tinta:#16130f; --gris:#6b6359; --paper:#ffffff; --fons:#fafafa;
  --vora:#ececec; --ombra:rgba(0,0,0,.08);
  --c-esceniques:#e23b54;
  --c-musicals:#f0820a;
  --c-plastiques:#1aa179;
  --c-popular:#d4264e;
  --c-literatura:#3257be;
  --c-cinema:#7b3fe4;
  --c-formacio:#0f9bd1;
  --c-dansa:#c0379b;
  --c-conferencies:#0d8a8a;
  --c-altres:#5a6472;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--paper);color:var(--tinta);-webkit-font-smoothing:antialiased;line-height:1.5}

/* menú hamburguesa */
.menu-boto{position:fixed;top:1.1rem;left:1.1rem;z-index:60;width:46px;height:46px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;
  background:var(--paper);border:1.5px solid var(--vora);border-radius:11px;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.08);transition:box-shadow .2s}
.menu-boto:hover{box-shadow:0 4px 14px rgba(0,0,0,.14)}
.gestors-boto{position:fixed;top:1.1rem;right:1.1rem;z-index:60;width:46px;height:46px;
  display:flex;justify-content:center;align-items:center;
  background:var(--paper);border:1.5px solid var(--vora);border-radius:11px;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.08);transition:box-shadow .2s;text-decoration:none}
.gestors-boto:hover{box-shadow:0 4px 14px rgba(0,0,0,.14)}
.gestors-boto svg{width:26px;height:26px;stroke:var(--tinta);fill:none;stroke-width:1.7}
.gestors-boto .tip{position:absolute;top:54px;right:0;background:var(--tinta);color:#fff;
  font-family:'Outfit',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.04em;
  padding:.4rem .6rem;border-radius:7px;white-space:nowrap;opacity:0;pointer-events:none;
  transition:opacity .2s;text-transform:uppercase}
.gestors-boto:hover .tip{opacity:1}
.menu-boto span{display:block;width:22px;height:2.4px;background:var(--tinta);border-radius:2px;transition:transform .25s,opacity .25s}
.menu-boto.obert span:nth-child(1){transform:translateY(7.4px) rotate(45deg)}
.menu-boto.obert span:nth-child(2){opacity:0}
.menu-boto.obert span:nth-child(3){transform:translateY(-7.4px) rotate(-45deg)}
.menu-rerefons{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:55;opacity:0;
  pointer-events:none;transition:opacity .25s}
.menu-rerefons.obert{opacity:1;pointer-events:auto}
.menu-panell{position:fixed;top:0;left:0;height:100%;width:min(280px,80vw);z-index:58;
  background:var(--paper);box-shadow:2px 0 24px rgba(0,0,0,.18);
  transform:translateX(-100%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
  padding:5rem 0 1.5rem;display:flex;flex-direction:column}
.menu-panell.obert{transform:translateX(0)}
.menu-panell a{display:block;padding:1rem 1.6rem;font-family:'Cinzel',serif;font-weight:600;
  font-size:1.05rem;letter-spacing:.08em;text-transform:uppercase;color:var(--tinta);
  text-decoration:none;border-left:4px solid transparent;transition:background .15s,border-color .15s}
.menu-panell a:hover{background:var(--fons);border-left-color:var(--c-musicals)}
.capcalera{padding:3.2rem 1.5rem 1.5rem;text-align:center;max-width:1200px;margin:0 auto}
.capcalera h1{font-family:'Cinzel',serif;font-weight:800;font-size:clamp(2rem,5vw,3.4rem);letter-spacing:.06em;line-height:1.1;text-transform:uppercase}
.capcalera h1 em{font-style:normal;font-weight:400;display:block;font-size:.55em;letter-spacing:.12em;color:var(--gris);margin-top:.4rem}
.capcalera p{color:var(--gris);font-size:1.15rem;margin-top:.6rem;font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500}
.capcalera p .ressalta{font-family:'Cinzel',serif;font-style:normal;font-weight:700;font-size:1.35em;letter-spacing:.06em;text-transform:uppercase;color:var(--tinta);cursor:pointer;text-decoration:none;transition:color .2s}
.capcalera p .ressalta:hover{color:var(--c-musicals)}

.bloc{max-width:1200px;margin:0 auto;padding:1.6rem 1.5rem}
.bloc-titol{display:flex;flex-direction:column;align-items:center;gap:.2rem;margin-bottom:1.1rem;text-align:center}
.bloc-titol .n{font-family:'Cinzel',serif;font-weight:500;font-size:.95rem;color:var(--gris);letter-spacing:.15em}
.bloc-titol h2{font-family:'Cinzel',serif;font-weight:700;font-size:1.9rem;letter-spacing:.08em;text-transform:uppercase}
.bloc-titol .ajuda{font-size:.9rem;color:var(--gris);font-weight:400;font-family:'Cormorant Garamond',serif;font-style:italic}

.bloc-que{padding-bottom:.6rem}
.categories{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;background:#fff;width:100%}
@media(max-width:760px){.categories{grid-template-columns:1fr}}
.cat{position:relative;aspect-ratio:1080/270;overflow:hidden;cursor:pointer;border:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  background-size:cover;background-position:center;background-color:#222;
  transition:transform .3s cubic-bezier(.2,.8,.2,1),box-shadow .3s}
.cat::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.46);transition:background .3s}
.cat:hover::after{background:rgba(0,0,0,.30)}
.cat .txt{position:relative;z-index:2;color:#fff;padding:0 1rem}
.cat .nom{font-family:'Cinzel',serif;font-weight:600;font-size:clamp(1.4rem,3vw,2.4rem);
  letter-spacing:.18em;text-transform:uppercase;line-height:1.1;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.cat .sub{font-family:'Outfit',sans-serif;font-weight:300;font-size:.82rem;letter-spacing:.05em;
  margin-top:.5rem;opacity:.92;text-shadow:0 1px 6px rgba(0,0,0,.6)}
.cat .check{position:absolute;top:.8rem;right:.8rem;z-index:3;width:30px;height:30px;border-radius:50%;
  background:#fff;color:var(--tint,#000);display:none;align-items:center;justify-content:center;font-weight:800}
.cat.actiu::after{background:color-mix(in srgb, var(--tint,#000) 55%, rgba(0,0,0,.45))}
.cat.actiu{box-shadow:inset 0 0 0 4px var(--tint,#000)}
.cat.actiu .check{display:flex}

.dates{display:flex;gap:1.4rem;flex-wrap:wrap;justify-content:center}
.camp-data{display:flex;flex-direction:column;gap:.35rem;align-items:center}
.camp-data label{font-size:.82rem;color:var(--gris);font-weight:500;text-transform:uppercase;letter-spacing:.06em;text-align:center}
.camp-data input{font-family:'Outfit',sans-serif;font-size:1rem;padding:.7rem .9rem;border:1.5px solid var(--vora);
  border-radius:11px;background:var(--paper);color:var(--tinta);transition:border-color .2s}
.camp-data input:focus{outline:none;border-color:var(--c-literatura)}

/* ---- secció Quan: tres botons de temps centrats a dalt + dates a sota en una línia ---- */
/* Alçada de referència = 60% de l'alçada d'un botó de categoria (~90px). */
.temps-botons{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;margin-bottom:1.3rem;--h-temps:90px}
.temps{position:relative;overflow:hidden;cursor:pointer;border:none;height:var(--h-temps);
  flex:1 1 0;max-width:340px;min-width:180px;
  display:flex;align-items:center;justify-content:center;text-align:center;border-radius:4px;
  background-size:cover;background-position:center;background-color:#3a4a24;
  transition:transform .3s cubic-bezier(.2,.8,.2,1),box-shadow .3s}
.temps::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.42);transition:background .3s}
.temps:hover::after{background:rgba(0,0,0,.26)}
.temps .nom{position:relative;z-index:2;color:#fff;font-family:'Cinzel',serif;font-weight:600;
  font-size:clamp(1.1rem,2.2vw,1.9rem);letter-spacing:.16em;text-transform:uppercase;line-height:1.1;
  text-shadow:0 2px 12px rgba(0,0,0,.5)}
.temps.actiu::after{background:color-mix(in srgb, var(--c-musicals) 70%, transparent)}
.temps.actiu{box-shadow:0 0 0 4px var(--c-musicals), 0 6px 18px rgba(240,130,10,.45);transform:translateY(-3px)}
.temps.actiu .nom{text-shadow:0 2px 10px rgba(0,0,0,.7)}
@media(max-width:760px){
  .temps-botons{--h-temps:64px;gap:.6rem}
  .temps .nom{font-size:clamp(.85rem,4vw,1.3rem);letter-spacing:.06em}
}

.lloc-controls{display:flex;gap:.9rem;flex-wrap:wrap;align-items:center;justify-content:center}
.lloc-controls select{flex:1;min-width:200px;font-family:'Outfit',sans-serif;font-size:1rem;padding:.7rem .9rem;
  border:1.5px solid var(--vora);border-radius:11px;background:var(--paper);color:var(--tinta);cursor:pointer}
.lloc-controls select:focus{outline:none;border-color:var(--c-plastiques)}
.toggle-mapa{display:flex;gap:.3rem;background:var(--fons);border-radius:11px;padding:.3rem}
.toggle-mapa button{border:none;background:none;padding:.5rem .95rem;border-radius:8px;cursor:pointer;
  font-family:'Outfit',sans-serif;font-weight:600;font-size:.9rem;color:var(--gris);transition:all .2s}
.toggle-mapa button.actiu{background:var(--tinta);color:#fff}

.cerca{max-width:1200px;margin:0 auto;padding:0 1.5rem}
.cerca input{width:100%;font-family:'Outfit',sans-serif;font-size:1.05rem;padding:.85rem 1.1rem;
  border:1.5px solid var(--vora);border-radius:13px;background:var(--paper)}
.cerca input:focus{outline:none;border-color:var(--c-musicals)}

.barra-res{max-width:1200px;margin:1.2rem auto .4rem;padding:0 1.5rem;display:flex;align-items:baseline;gap:.6rem}
#barra-carrega{max-width:1200px;margin:1rem auto;padding:1.4rem 1.5rem;text-align:center}
#barra-carrega .bc-text{font-family:'Cinzel',serif;font-weight:600;font-size:1.05rem;letter-spacing:.08em;color:var(--c-musicals);margin-bottom:.7rem;text-transform:uppercase}
#barra-carrega .bc-pista{height:10px;background:var(--vora);border-radius:20px;overflow:hidden;max-width:380px;margin:0 auto}
#barra-carrega .bc-omple{height:100%;width:0%;background:var(--c-musicals);border-radius:20px;transition:width .25s ease}
#barra-carrega .bc-pct{font-family:'Outfit',sans-serif;font-size:.82rem;color:var(--gris);margin-top:.5rem}
#barra-carrega.amagat{display:none}
/* mentre es descarrega, els filtres queden atenuats i no clicables */
body.carregant .filtres-bloquejables{opacity:.45;pointer-events:none;filter:grayscale(.3)}
.barra-res .compte{font-family:'Cinzel',serif;font-weight:700;font-size:1.5rem}
.barra-res .et{color:var(--gris);font-weight:300}
.barra-res .netejar{margin-left:auto;background:none;border:none;color:var(--c-esceniques);font-weight:600;
  cursor:pointer;font-family:'Outfit',sans-serif;font-size:.9rem}

.vista{display:none;max-width:1200px;margin:0 auto;padding:1rem 1.5rem 4rem}
.vista.actiu{display:block}

.graella{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.3rem}
.targeta{background:var(--paper);border:1px solid rgba(0,0,0,.04);border-radius:16px;overflow:hidden;
  transition:transform .25s cubic-bezier(.2,.8,.2,1),box-shadow .25s;cursor:pointer;display:flex;flex-direction:column;height:437px;
  box-shadow:0 1px 2px rgba(0,0,0,.06), 0 6px 16px rgba(0,0,0,.10), 0 14px 30px rgba(0,0,0,.08)}
.targeta:hover{transform:translateY(-6px);box-shadow:0 4px 8px rgba(0,0,0,.08), 0 14px 28px rgba(0,0,0,.16), 0 26px 50px rgba(0,0,0,.12)}
.targeta .foto{flex:1;background:var(--fons);background-size:cover;background-position:center}
.targeta .cos{flex:1;padding:.9rem 1rem;display:flex;flex-direction:column;gap:.35rem;overflow:hidden}
.targeta .data{font-size:.8rem;font-weight:600;color:var(--c-musicals);text-transform:uppercase;letter-spacing:.03em}
.targeta h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.3rem;line-height:1.15;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.targeta .detall{font-size:.84rem;color:var(--tinta);line-height:1.3;flex-shrink:0;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.targeta .detall .preu{color:#1f6feb;font-weight:700;white-space:nowrap}
.targeta .detall .preu.gratis{color:#1a9e54;font-weight:700}
.targeta .desc{flex:1;min-height:0;overflow:hidden;
  font-size:.95rem;color:var(--gris);line-height:1.4;font-family:'Cormorant Garamond',serif;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3}
.targeta .desc-buit{flex:1;min-height:0}
.targeta .lloc{font-size:.86rem;color:var(--gris);flex-shrink:0;padding-top:.35rem}

#mapa{height:560px;border-radius:16px;border:1px solid var(--vora)}
.estat{text-align:center;color:var(--gris);padding:3rem;font-weight:300}
.peu{text-align:center;color:var(--gris);font-size:.82rem;padding:2rem 1.5rem 3rem;font-weight:300}
</style>
</head>
<body>

<!-- menú hamburguesa -->
<button class="menu-boto" id="menu-boto" aria-label="Obre el menú" aria-expanded="false">
  <span></span><span></span><span></span>
</button>
<div class="menu-rerefons" id="menu-rerefons"></div>
<nav class="menu-panell" id="menu-panell" aria-label="Menú principal">
  <a href="https://aiprovesxavi-collab.github.io/webagendacultural/index.html">QFEM · AGENDA GENERAL</a>
</nav>

<!-- accés al portal de gestors -->
<a class="gestors-boto" href="../gestors/" aria-label="Portal de gestors culturals">
  <svg viewBox="0 0 24 24"><circle cx="12" cy="9" r="3.2"/><path d="M5.5 19a6.5 6.5 0 0 1 13 0"/><circle cx="12" cy="12" r="10.2"/></svg>
  <span class="tip">Gestors culturals</span>
</a>

<header class="capcalera">
  <h1>Agenda Musical <em>de Catalunya</em></h1>
  <p>Descobreix <a class="ressalta" data-scroll="sec-que">què</a> passa, <a class="ressalta" data-scroll="sec-quan">quan</a> i <a class="ressalta" data-scroll="sec-on">on</a></p>
</header>

<div id="barra-carrega">
  <div class="bc-text">Descarregant l'agenda…</div>
  <div class="bc-pista"><div class="bc-omple" id="bc-omple"></div></div>
  <div class="bc-pct" id="bc-pct">0%</div>
</div>

<div class="cerca filtres-bloquejables">
  <input id="f-text" type="text" placeholder="Cerca un acte, un artista, un tema, un municipi…">
</div>

<!-- QUÈ -->
<section class="bloc bloc-que" id="sec-que">
  <div class="bloc-titol"><h2>Què</h2></div>
</section>
<div class="categories filtres-bloquejables" id="categories"></div>

<!-- QUAN -->
<section class="bloc filtres-bloquejables" id="sec-quan">
  <div class="bloc-titol"><h2>Quan</h2></div>
  <div class="temps-botons">
    <button type="button" class="temps" data-temps="avui" style="background-image:url('avui.jpeg')"><span class="nom">Avui</span></button>
    <button type="button" class="temps" data-temps="dema" style="background-image:url('dema.jpeg')"><span class="nom">Demà</span></button>
    <button type="button" class="temps" data-temps="setmana" style="background-image:url('setmana.jpeg')"><span class="nom">Fins diumenge</span></button>
  </div>
  <div class="dates">
    <div class="camp-data"><label>Des del</label><input id="f-desde" type="date"></div>
    <div class="camp-data"><label>Fins al</label><input id="f-fins" type="date"></div>
  </div>
</section>

<style>
#mapa-comarques{position:relative;width:100%;max-width:560px;margin:0 auto}
#mapa-comarques .mapa-ajuda{font-size:.85rem;color:#666;margin-bottom:6px;text-align:center}
#mapa-comarques #netcomarques{border:1px solid #ccc;background:#fff;border-radius:14px;padding:2px 10px;cursor:pointer;font-size:.8rem;margin-left:6px}
#geo-zona{width:100%;display:flex;flex-direction:column;align-items:center;gap:.5rem;margin-bottom:1rem}
#geo-boto{border:1.5px solid var(--vora);background:var(--paper);border-radius:30px;padding:.55rem 1.2rem;
  cursor:pointer;font-family:'Outfit',sans-serif;font-weight:600;font-size:.92rem;color:var(--tinta);
  box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all .2s}
#geo-boto:hover{border-color:var(--c-musicals);color:var(--c-musicals)}
#geo-boto:disabled{opacity:.6;cursor:default}
#geo-resultat{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;width:100%}
/* botó del municipi: estil com els de temps (Avui/Demà) però una mica més llarg */
.geo-chip{position:relative;overflow:hidden;cursor:pointer;border:none;height:var(--h-temps,90px);
  min-width:240px;max-width:420px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;text-align:center;
  background-image:url('poble.jpg');background-size:cover;background-position:center;background-color:#3a4a24;
  transition:transform .3s cubic-bezier(.2,.8,.2,1),box-shadow .3s}
.geo-chip::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.42);transition:background .3s}
.geo-chip:hover::after{background:rgba(0,0,0,.26)}
.geo-chip .nom{position:relative;z-index:2;color:#fff;font-family:'Cinzel',serif;font-weight:600;
  font-size:clamp(1.1rem,2.2vw,1.7rem);letter-spacing:.12em;text-transform:uppercase;line-height:1.1;
  text-shadow:0 2px 12px rgba(0,0,0,.5);padding:0 1rem}
.geo-chip.actiu::after{background:color-mix(in srgb, var(--c-musicals) 70%, transparent)}
.geo-chip.actiu{box-shadow:0 0 0 4px var(--c-musicals), 0 6px 18px rgba(240,130,10,.45);transform:translateY(-3px)}
@media(max-width:760px){
  .geo-chip{height:64px;min-width:200px}
  .geo-chip .nom{font-size:clamp(.85rem,4vw,1.3rem);letter-spacing:.06em}
}
.geo-info{font-size:.85rem;color:var(--gris);text-align:center}
#mapacat{width:70%;min-width:300px;max-width:460px;height:auto;display:block;margin:0 auto}
#mapacat .cm{stroke:#fff;stroke-width:1.1;cursor:pointer;transition:opacity .15s,filter .15s}
#mapacat .cm:hover{filter:brightness(1.12)}
#mapacat.te-seleccio .cm{opacity:.30}
#mapacat.te-seleccio .cm.sel{opacity:1}
#mapacat .cm.sel{stroke:#222;stroke-width:2.2}
#mapacat .cm-lbl{font-size:18px;font-weight:600;fill:#fff;stroke:rgba(0,0,0,.42);stroke-width:2.4;paint-order:stroke;text-transform:uppercase;dominant-baseline:central;pointer-events:none}
.cm-tip{position:absolute;transform:translate(-50%,-145%);background:#222;color:#fff;font-size:.8rem;font-weight:600;letter-spacing:.03em;text-transform:uppercase;padding:3px 8px;border-radius:6px;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .12s;z-index:5}
</style>
<!-- ON -->
<section class="bloc filtres-bloquejables" id="sec-on">
  <div class="bloc-titol"><h2>On</h2></div>
  <div id="geo-zona">
    <button type="button" id="geo-boto">📍 A prop meu</button>
    <div id="geo-resultat"></div>
  </div>
  <div class="lloc-controls">
    <div id="mapa-comarques">
      <div class="mapa-ajuda">O toca una o més comarques per filtrar
        <button type="button" id="netcomarques">Totes</button>

// subcategories musicals d'un acte (només les d'"Arts musicals")
function subcatsMusicals(a){
  const s = new Set();
  (a.categories||[]).forEach(x=>{
    if(x && x.categoria==="Arts musicals" && x.subcategoria) s.add(x.subcategoria);
  });
  return [...s];
}
// quins gèneres (etiquetes) té un acte, segons les seves subcategories musicals
function generesActe(a){
  const subs = subcatsMusicals(a);
  return CATS.filter(c => c.subs.some(sub => subs.includes(sub))).map(c=>c.etiqueta);
}

async function carregaFiltres(){
  // municipis, comarques i subcategories EN PARAL·LEL (més ràpid que en sèrie)
  const [rMuns, rComs, rSubs, rCats] = await Promise.all([
    sb.from("municipis").select("id,nom,comarca_id,latitud,longitud").order("nom"),
    sb.from("comarques").select("id,nom").order("nom"),
    sb.from("subcategories").select("nom,imatge,categoria_id"),
    sb.from("categories").select("id,nom"),
  ]);
  window._municipis = rMuns.data || [];
  window._comarques = rComs.data || [];
  // Mapa indexat per "categoria|subcategoria" perquè els "Altres" no es trepitgin.
  const catPerId = {};
  (rCats.data||[]).forEach(c=>{ catPerId[c.id]=c.nom; });
  window._subImg = {};
  (rSubs.data||[]).forEach(s=>{
    if(!s.imatge) return;
    const catNom = catPerId[s.categoria_id] || "";
    window._subImg[catNom + "|" + s.nom] = s.imatge;
  });
  // el filtre per comarca ara és el mapa clicable; no omplim cap <select>
  initMapaComarques();
}
// ---- utilitats ----
function fmtData(d){
  if(!d) return "Data per confirmar";
  const x=new Date(d);
  return x.toLocaleDateString('ca-ES',{weekday:'long',day:'numeric',month:'long'});
}
function fmtHora(horari){
  if(!horari) return "";
  const m = horari.match(/(\d{1,2})\s*[:.h]?\s*(\d{2})?/);
  if(!m) return "";
  let h = parseInt(m[1],10);
  let min = m[2]?m[2]:"00";
  if(h<0||h>23) return "";
  return String(h).padStart(2,'0')+":"+min;
}
function fmtDataHora(d, horari){
  const data = fmtData(d);
  const hora = fmtHora(horari);
  return hora ? `${data} · ${hora}` : data;
}
// nom municipi a partir del camp text de actes_publicada
function nomMunicipi(a){ return a.municipi || ""; }
// categories de l'acte (camp jsonb "categories")
function categoriesActe(a){
  const c=new Set();
  (a.categories||[]).forEach(x=>{ if(x && x.categoria) c.add(x.categoria); });
  return [...c];
}
// preu net: "Gratuït" si ho és, si no el text del preu (o null si no se sap)
function preuActe(a){
  if(a.preu_gratuit===true) return "Gratuït";
  const p=(a.preu||"").toString().trim();
  if(!p) return null;
  if(/^(0|0[.,]0+|gratu)/i.test(p)) return "Gratuït";
  return p;
}
// informació complementària per a la targeta, en cascada segons què hi hagi:
// 1) artistes (+ preu)  2) categoria  3) públic destinatari  4) tros de descripció
function detallActe(a){
  const artistes=(a.artistes||"").toString().trim();
  const preu=preuActe(a);
  if(artistes){
    return {txt: artistes, extra: preu};
  }
  const cats=categoriesActe(a);
  if(cats.length){
    return {txt: cats.join(" · "), extra: preu};
  }
  const pub=(a.public_desti||"").toString().trim();
  if(pub){
    return {txt: pub, extra: preu};
  }
  const desc=(a.descripcio_net||"").toString().trim();
  if(desc){
    return {txt: desc, extra: null};
  }
  return {txt: null, extra: preu};
}
// imatge de RESERVA: subcategoria MUSICAL (per categoria|subcategoria) -> altresmusica
function imatgeReserva(a){
  const subImg = window._subImg || {};
  for(const p of (a.categories||[])){
    if(p && p.categoria==="Arts musicals" && p.subcategoria){
      const fitxer = subImg["Arts musicals|" + p.subcategoria];
      if(fitxer) return "imatges/" + fitxer;
    }
  }
  return "imatges/altresmusica.jpg";
}
// imatge PRÒPIA de l'acte (pot ser externa i fallar), o null
function imatgePropia(a){ return a.imatge || null; }

// compatibilitat: imatge inicial a mostrar = sempre la de reserva
function imatgeActe(a){ return imatgeReserva(a); }

// intenta carregar la imatge pròpia (externa) amb límit de temps;
// si carrega bé dins el termini, posa-la com a fons de l'element;
// si falla o triga massa, no fa res (queda la de reserva ja pintada).
function provaImatgePropia(el, url, msTimeout){
  if(!url) return;
  const img = new Image();
  let fet = false;
  const timer = setTimeout(()=>{ if(!fet){ fet=true; img.src=""; } }, msTimeout||4000);
  img.onload = ()=>{ if(!fet){ fet=true; clearTimeout(timer); el.style.backgroundImage = `url('${url}')`; } };
  img.onerror = ()=>{ if(!fet){ fet=true; clearTimeout(timer); } };
  img.src = url;
}

const CAMPS_LLISTA = "id,nom,data_inici,data_fi,data_text,horari_text,descripcio_net,artistes,categories,imatge,lloc_nom,municipi,municipi_id,preu,preu_gratuit,public_desti,latitud,longitud";

// baixa tots els actes futurs per lots, omplint la barra de progrés
async function carregaTotsElsActes(){
  const avui = new Date().toISOString().slice(0,10);
  const omple = $("#bc-omple");
  const pct = $("#bc-pct");
  const barra = document.getElementById("barra-carrega");
  document.body.classList.add("carregant");   // bloqueja els filtres FINS AL FINAL

  let progres = 0;          // % mostrat ara mateix
  function mostraPct(v){
    progres = Math.min(100, v);
    const r = Math.round(progres);
    omple.style.width = r + "%";
    pct.textContent = r + "%";
  }

  // BARRA FANTASMA: avança sola des del primer instant perquè l'usuari
  // vegi moviment mentre Supabase es desperta i arriba el primer lot.
  // Puja ràpid al principi i s'alenteix a mesura que s'apropa al 90%.
  let fantasmaActiu = true;
  const fantasma = setInterval(()=>{
    if(!fantasmaActiu) return;
    if(progres < 90){
      // com més a prop del 90, més lent (efecte "frena")
      const pas = Math.max(0.4, (90 - progres) * 0.04);
      mostraPct(progres + pas);
    }
  }, 120);

  let totes = [];
  let desdeFila = 0;
  const MIDA = 1000;
  let pintatPrimer = false;

  while(true){
    const {data, error} = await sb.from("actes_publicada")
      .select(CAMPS_LLISTA)
      .contains("categories", JSON.stringify([{categoria:"Arts musicals"}]))
      .or(`data_fi.gte.${avui},and(data_fi.is.null,data_inici.gte.${avui})`)
      .order("data_inici",{ascending:true})
      .range(desdeFila, desdeFila + MIDA - 1);
    if(error){ $("#estat-llista").textContent="Error carregant les dades: "+error.message; break; }
    if(!data || data.length===0) break;
    totes = totes.concat(data);

    // pinta el PRIMER lot de seguida (sense activar filtres)
    if(!pintatPrimer){
      pintaLlista(data, false);
      pintatPrimer = true;
      $("#compte").textContent = totes.length;
      $("#et-res").textContent = "actes…";
    }

    if(data.length < MIDA) break;
    desdeFila += MIDA;
    if(desdeFila > 200000) break;
  }

  // dades llestes: atura la fantasma i completa fins al 100%
  fantasmaActiu = false;
  clearInterval(fantasma);
  window._totsActes = totes;
  mostraPct(100);
  // amaga la barra i DESBLOQUEJA els filtres
  setTimeout(()=>{
    barra.classList.add("amagat");
    document.body.classList.remove("carregant");
  }, 300);
  return totes;
}

// extreu l'hora d'un text d'horari en minuts; sense hora -> 9999 (al final)
function minutsHora(text){
  if(!text) return 9999;
  const m = String(text).match(/(\d{1,2})[:\.h](\d{2})?/);
  if(!m) return 9999;
  const h = parseInt(m[1],10);
  const min = m[2] ? parseInt(m[2],10) : 0;
  if(isNaN(h) || h>23 || min>59) return 9999;
  return h*60 + min;
}

// === FILTRATGE EN LOCAL (instantani) ===
// aplica tots els filtres actius sobre window._totsActes i pinta el resultat
function aplicaFiltres(){
  if(!window._totsActes){ return; }  // encara carregant
  let res = window._totsActes;

  // --- text de cerca (s'afegeix als altres) ---
  const text = $("#f-text").value.trim().toLowerCase();
  if(text){
    const paraules = text.replaceAll(","," ").split(/\s+/).filter(Boolean);
    res = res.filter(a=>{
      const sac = ((a.nom||"")+" "+(a.descripcio_net||"")+" "+(a.artistes||"")+" "+(a.lloc_nom||"")+" "+(a.municipi||"")).toLowerCase();
      return paraules.every(p=>sac.includes(p));
    });
  }

  // --- gèneres seleccionats (s'afegeix) ---
  const gens = [...seleccionades];
  if(gens.length){
    res = res.filter(a=>{
      const seus = generesActe(a);          // gèneres d'aquest acte
      return gens.some(g=>seus.includes(g));
    });
  }

  // --- geolocalització (municipi concret) o comarca (excloents entre elles) ---
  if(window._geoMunId){
    res = res.filter(a=>a.municipi_id===window._geoMunId);
  } else if(comarquesSel.size){
    const idsMun = new Set((window._municipis||[])
      .filter(m=>comarquesSel.has(String(m.comarca_id))).map(m=>m.id));
    res = res.filter(a=>idsMun.has(a.municipi_id));
  }

  // --- dates (des de / fins) — INCLOU actes EN CURS ---
  // Un acte surt si està actiu en algun moment del període: inici <= fins i fi >= desde
  const desde = $("#f-desde").value;
  const fins = $("#f-fins").value;
  if(desde || fins){
    res = res.filter(a=>{
      const ini = (a.data_inici||"").slice(0,10);
      if(!ini) return false;
      const fi = (a.data_fi||"").slice(0,10) || ini;
      if(fins && ini > fins) return false;
      if(desde && fi < desde) return false;
      return true;
    });
  }

  // --- TREU els actes PUNTUALS ja passats (un sol dia + hora, amb moment passat) ---
  {
    const ara = new Date();
    res = res.filter(a=>{
      const ini = (a.data_inici||"").slice(0,10);
      if(!ini) return true;
      const fi = (a.data_fi||"").slice(0,10) || ini;
      const min = minutsHora(a.horari_text);
      const esPuntual = (fi === ini) && (min !== 9999);
      if(!esPuntual) return true;
      const [y,m,d] = ini.split("-").map(n=>parseInt(n,10));
      const moment = new Date(y, m-1, d, Math.floor(min/60), min%60, 0);
      return moment >= ara;
    });
  }

  // --- ORDENACIÓ: per data i, dins del mateix dia, per hora (sense hora al final) ---
  res = res.slice().sort((a,b)=>{
    const da = (a.data_inici||"").slice(0,10);
    const db = (b.data_inici||"").slice(0,10);
    if(da !== db) return da < db ? -1 : 1;
    return minutsHora(a.horari_text) - minutsHora(b.horari_text);
  });

  // pinta el resultat
  window._filtrats = res;
  $("#compte").textContent = res.length;
  $("#et-res").textContent = res.length===1?"acte trobat":"actes trobats";
  pintaLlistaPaginada(res);
  pintaMapa(res);
  $("#estat-llista").textContent = res.length?"":"No s'han trobat actes amb aquests filtres.";
}

let _pagina = 0;
const PER_PAGINA = 60;
function pintaLlistaPaginada(res){
  _pagina = 0;
  $("#graella").innerHTML = "";
  mostraMesActes(res);
}
function mostraMesActes(res){
  const inici = _pagina*PER_PAGINA;
  const tros = res.slice(inici, inici+PER_PAGINA);
  pintaLlista(tros, _pagina>0);
  _pagina++;

  if(_pagina*PER_PAGINA >= window._filtrats.length) return;  // ja estan tots
  const aprop = window.innerHeight + window.scrollY >= document.body.offsetHeight - 600;
  if(aprop) mostraMesActes(window._filtrats);
});

function pintaLlista(actes, afegir=false){
  const g=$("#graella");
  if(!afegir) g.innerHTML="";
  actes.forEach(a=>{
    const t=document.createElement("article");
    t.className="targeta";
    const d = detallActe(a);
    const preuClasse = (d.extra==="Gratuït") ? "preu gratis" : "preu";
    const detallHtml = d.txt
      ? `<div class="detall">${d.txt}${d.extra?` <span class="${preuClasse}">· ${d.extra}</span>`:""}</div>`
      : (d.extra?`<div class="detall"><span class="${preuClasse}">${d.extra}</span></div>`:"");
    // descripció que omple l'espai restant fins al lloc; s'amaga si la cascada
    // ja mostrava la descripció (per no repetir-la)
    const desc=(a.descripcio_net||"").toString().trim();
    const descHtml = (desc && desc!==d.txt) ? `<div class="desc">${desc}</div>` : `<div class="desc-buit"></div>`;
    t.innerHTML=`
      <div class="foto" style="background-image:url('${imatgeActe(a)}')"></div>
      <div class="cos">
        <div class="data">${a.data_text || fmtDataHora(a.data_inici, a.horari_text)}</div>
        <h3>${a.nom||"Acte sense títol"}</h3>
        ${detallHtml}
        ${descHtml}

      </div>`;
    t.onclick=()=>{ location.href = "acte.html?id=" + a.id; };
    g.appendChild(t);
    // xarxa de seguretat: intenta la imatge pròpia (externa); si falla/triga, queda la de reserva
    const elFoto = t.querySelector(".foto");
    provaImatgePropia(elFoto, imatgePropia(a), 4000);
  });
}

// ---- mapa ----
// treu [lat,lng] d'un acte provant diversos noms de camp possibles
function coordsActe(a){
  const num=v=>{const n=parseFloat(v);return isFinite(n)?n:null;};
  let lat=num(a.latitud)??num(a.lat)??num(a.latitude);
  let lng=num(a.longitud)??num(a.lng)??num(a.lon)??num(a.longitude);
  if(lat==null||lng==null){
    // de vegades ve un sol camp "lat,lng" (p.ex. localitzacio)
    const s=a.localitzacio||a.coord||a.coordenades||a.geo||"";
    const m=String(s).match(/(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/);
    if(m){ lat=parseFloat(m[1]); lng=parseFloat(m[2]); }
  }
  if(lat==null||lng==null) return null;
  // a Catalunya lat≈40-43, lng≈0-3.5; si vénen capgirats, els intercanviem
  if(lat>0&&lat<5&&lng>38&&lng<44){ const t=lat;lat=lng;lng=t; }
  return [lat,lng];
}
function pintaMapa(actes){
  if(!mapa){
    mapa=L.map('mapa').setView([41.75,1.8],8);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
      {subdomains:'abcd',maxZoom:20,attribution:'© OpenStreetMap © CARTO'}).addTo(mapa);
    capaMarcadors=L.layerGroup().addTo(mapa);
  }
  capaMarcadors.clearLayers();
  const punts=[];
  actes.forEach(a=>{
    const c=coordsActe(a);
    if(c){
      L.marker(c).addTo(capaMarcadors)
        .bindPopup(`<b>${a.nom||""}</b><br>${fmtData(a.data_inici)}<br>${[a.lloc_nom,nomMunicipi(a)].filter(Boolean).join(", ")}`);
      punts.push(c);
    }
  });
  console.log(`Mapa: ${punts.length} actes amb coordenades de ${actes.length}`);
  if(punts.length) mapa.fitBounds(punts,{padding:[30,30],maxZoom:12});
}

// ---- botons de temps (Avui / Demà / Fins diumenge), acumulables ----
function isoLocal(d){
  // data local en format YYYY-MM-DD (sense desfasament de fus)
  return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
}
function rangTemps(clau){
  const ara=new Date(); ara.setHours(0,0,0,0);
  if(clau==="avui"){ return [new Date(ara), new Date(ara)]; }
  if(clau==="dema"){ const d=new Date(ara); d.setDate(d.getDate()+1); return [d, new Date(d)]; }
  if(clau==="setmana"){
    // d'avui fins al diumenge d'aquesta setmana (si avui ja és diumenge, avui mateix)
    const diug=new Date(ara); const dow=(diug.getDay()+6)%7; // 0=dilluns … 6=diumenge
    diug.setDate(diug.getDate()+(6-dow));
    return [new Date(ara), diug];
  }
  return null;
}
function aplicaTemps(){
  const actius=[...document.querySelectorAll(".temps.actiu")].map(b=>b.dataset.temps);
  if(!actius.length) return false;
  let min=null,max=null;
  actius.forEach(c=>{
    const r=rangTemps(c); if(!r) return;
    if(!min||r[0]<min) min=r[0];
    if(!max||r[1]>max) max=r[1];
  });
  if(min&&max){ $("#f-desde").value=isoLocal(min); $("#f-fins").value=isoLocal(max); }
  return true;
}
document.querySelectorAll(".temps").forEach(b=>{
  b.addEventListener("click",()=>{
    b.classList.toggle("actiu");
    if(!aplicaTemps()){ $("#f-desde").value=""; $("#f-fins").value=""; }
    carregaActes();
  });
});

// ---- filtre per comarques (mapa clicable, noms de la taula comarques) ----
const comarquesSel = new Set();   // ids de comarca (taula comarques) seleccionats
function normNom(s){
  return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g," ").trim().replace(/\s+/g," ");
}
function trobaComarca(nomMapa){
  const n=normNom(nomMapa), coms=window._comarques||[];
  let c=coms.find(x=>normNom(x.nom)===n);
  if(!c) c=coms.find(x=>{const xn=normNom(x.nom);return xn.includes(n)||n.includes(xn);});
  return c||null;
}
function mostraTip(nom,x,y){
  const tip=document.getElementById("cm-tip"), cont=document.getElementById("mapa-comarques");
  if(!tip||!cont) return;
  const r=cont.getBoundingClientRect();
  tip.textContent=nom; tip.style.left=(x-r.left)+"px"; tip.style.top=(y-r.top)+"px"; tip.style.opacity="1";
}
function amagaTip(){ const t=document.getElementById("cm-tip"); if(t) t.style.opacity="0"; }
function actualitzaDimMapa(){
  const svg=document.getElementById("mapacat");
  if(svg) svg.classList.toggle("te-seleccio", comarquesSel.size>0);
}
function initMapaComarques(){
  const svg=document.getElementById("mapacat");
  if(!svg) return;
  svg.querySelectorAll(".cm").forEach(p=>{
    const c=trobaComarca(p.dataset.nom);
    if(c){ p.dataset.comid=c.id; p.dataset.comnom=c.nom; }
    else { console.warn("Comarca del mapa sense equivalent a la BD:", p.dataset.nom); }
    const nom=()=>p.dataset.comnom||p.dataset.nom;
    p.addEventListener("pointermove",e=>mostraTip(nom(),e.clientX,e.clientY));
    p.addEventListener("pointerleave", amagaTip);
    p.addEventListener("click",e=>{
      if(!p.dataset.comid){ mostraTip(nom(),e.clientX,e.clientY); return; }
      const id=p.dataset.comid;
      // si hi havia filtre de geolocalització, el traiem (no barregem)
      if(window._geoMunId){ window._geoMunId=null; document.getElementById("geo-resultat").innerHTML=""; }
      if(comarquesSel.has(id)){ comarquesSel.delete(id); p.classList.remove("sel"); }
      else { comarquesSel.add(id); p.classList.add("sel"); }
      actualitzaDimMapa(); mostraTip(nom(),e.clientX,e.clientY); carregaActes();
    });
  });
}
function esborraComarques(){
  comarquesSel.clear();
  document.querySelectorAll("#mapacat .cm.sel").forEach(p=>p.classList.remove("sel"));
  actualitzaDimMapa(); amagaTip();
}
document.addEventListener("click",e=>{
  if(e.target && e.target.id==="netcomarques"){ window._geoMunId=null; document.getElementById("geo-resultat").innerHTML=""; esborraComarques(); carregaActes(); }
});

// ---- geolocalització: "a prop meu" ----
// distància aproximada (km) entre dos punts lat/lng (fórmula de Haversine)
function distKm(lat1,lon1,lat2,lon2){
  const R=6371, rad=Math.PI/180;
  const dLat=(lat2-lat1)*rad, dLon=(lon2-lon1)*rad;
  const a=Math.sin(dLat/2)**2 + Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
// municipis ordenats per proximitat a unes coordenades
function municipisOrdenatsPerProximitat(lat,lng){
  return (window._municipis||[])
    .filter(m=>m.latitud!=null && m.longitud!=null)
    .map(m=>({...m, dist: distKm(lat,lng, +m.latitud, +m.longitud)}))
    .sort((a,b)=>a.dist-b.dist);
}
// filtra la llista pel municipi triat (per geolocalització)
function filtraPerMunicipi(munId, munNom){
  window._geoMunId = munId;
  // en activar geolocalització, traiem el filtre de comarca per no barrejar
  esborraComarques();
  carregaActes();
}
async function activaGeo(){
  const boto = document.getElementById("geo-boto");
  const res = document.getElementById("geo-resultat");
  if(!navigator.geolocation){
    res.innerHTML = '<div class="geo-info">El teu navegador no permet geolocalització.</div>';
    return;
  }
  boto.disabled = true;
  boto.textContent = "📍 Cercant…";
  navigator.geolocation.getCurrentPosition(
    async (pos)=>{
      const {latitude:lat, longitude:lng} = pos.coords;
      const propers = municipisOrdenatsPerProximitat(lat,lng);
      if(!propers.length){
        res.innerHTML = '<div class="geo-info">No s\'ha pogut determinar el municipi.</div>';
        boto.disabled=false; boto.textContent="📍 A prop meu"; return;
      }
      const meu = propers[0];
      // comptar quants actes futurs té el meu municipi (per saber si cal oferir-ne un de proper)
      const avui = new Date().toISOString().slice(0,10);
      const {count} = await sb.from("actes_publicada")
        .select("id",{count:"exact",head:true})
        .eq("municipi_id", meu.id)
        .or(`data_fi.gte.${avui},and(data_fi.is.null,data_inici.gte.${avui})`);

      // botó del meu municipi: estil gran, NOMÉS el nom (sense número)
      let html = `<button type="button" class="geo-chip" data-mun="${meu.id}"><span class="nom">${meu.nom}</span></button>`;

      // si el meu municipi té 0 actes, oferim el més proper AMB actes
      if(!count){
        const propAmbActes = await primerMunicipiAmbActes(propers, avui, meu.id);
        if(propAmbActes){
          html += `<button type="button" class="geo-chip prop" data-mun="${propAmbActes.id}"><span class="nom">i a prop: ${propAmbActes.nom} ↗</span></button>`;
        }
      }
      res.innerHTML = html;
      boto.disabled=false; boto.textContent="📍 A prop meu";
    },
    (err)=>{
      res.innerHTML = '<div class="geo-info">No has donat permís d\'ubicació.</div>';
      boto.disabled=false; boto.textContent="📍 A prop meu";
    },
    {enableHighAccuracy:false, timeout:8000, maximumAge:300000}
  );
}
// busca, entre els municipis més propers, el primer que tingui actes futurs
async function primerMunicipiAmbActes(propers, avui, exclouId){
  // mirem els 15 més propers per no fer massa consultes
  for(const m of propers.slice(0,15)){
    if(m.id===exclouId) continue;
    const {count} = await sb.from("actes_publicada")
      .select("id",{count:"exact",head:true})
      .eq("municipi_id", m.id)
      .or(`data_fi.gte.${avui},and(data_fi.is.null,data_inici.gte.${avui})`);
    if(count){ return {...m, count}; }
  }
  return null;
}
// clics als botons de geolocalització
document.addEventListener("click",e=>{
  // scroll suau des de les paraules del subtítol (Què/Quan/On) cap a la seva secció
  const ress = e.target.closest ? e.target.closest(".ressalta") : null;
  if(ress && ress.dataset.scroll){
    const sec = document.getElementById(ress.dataset.scroll);
    if(sec) sec.scrollIntoView({behavior:"smooth", block:"start"});
    return;
  }
  if(e.target && e.target.id==="geo-boto"){ activaGeo(); return; }
  const chip = e.target.closest ? e.target.closest(".geo-chip") : null;
  if(chip){
    const munId = chip.getAttribute("data-mun");
    if(!munId) return;
    if(chip.classList.contains("actiu")){
      // ja estava marcat -> el desmarquem i traiem el filtre (tornen tots els actes)
      chip.classList.remove("actiu");
      window._geoMunId = null;
      aplicaFiltres();
    } else {
      // el marquem (taronja), desmarcant els altres, i filtrem pel municipi
      document.querySelectorAll(".geo-chip.actiu").forEach(b=>b.classList.remove("actiu"));
      chip.classList.add("actiu");
      filtraPerMunicipi(+munId);
    }
  }
});

(function(){
  const boto=document.getElementById("menu-boto");
  const panell=document.getElementById("menu-panell");
  const rere=document.getElementById("menu-rerefons");
  if(!boto) return;
  function obre(){ boto.classList.add("obert"); panell.classList.add("obert"); rere.classList.add("obert"); boto.setAttribute("aria-expanded","true"); }
  function tanca(){ boto.classList.remove("obert"); panell.classList.remove("obert"); rere.classList.remove("obert"); boto.setAttribute("aria-expanded","false"); }
  boto.addEventListener("click",()=>{ panell.classList.contains("obert")?tanca():obre(); });
  rere.addEventListener("click",tanca);
  document.addEventListener("keydown",e=>{ if(e.key==="Escape") tanca(); });
})();
