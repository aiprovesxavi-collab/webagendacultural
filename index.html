<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Cultural de Catalunya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --tinta:#16130f; --gris:#6b6359; --paper:#ffffff; --fons:#fafafa;
  --vora:#ececec; --ombra:rgba(0,0,0,.08);
  /* colors intensos per categoria */
  --c-esceniques:#e23b54;  /* vermell carmí */
  --c-musicals:#f0820a;    /* taronja */
  --c-plastiques:#1aa179;  /* verd maragda */
  --c-popular:#d4264e;     /* magenta */
  --c-literatura:#3257be;  /* blau */
  --c-cinema:#7b3fe4;      /* violeta */
  --c-formacio:#0f9bd1;    /* cian */
  --c-altres:#5a6472;      /* grafit */
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--paper);color:var(--tinta);-webkit-font-smoothing:antialiased;line-height:1.5}

/* ---------- capçalera ---------- */
.capcalera{padding:3.2rem 1.5rem 1.5rem;text-align:center;max-width:1200px;margin:0 auto}
.capcalera h1{font-family:'Cinzel',serif;font-weight:800;font-size:clamp(2rem,5vw,3.4rem);letter-spacing:.06em;line-height:1.1;text-transform:uppercase}
.capcalera h1 em{font-style:normal;font-weight:400;display:block;font-size:.55em;letter-spacing:.12em;color:var(--gris);margin-top:.4rem}
.capcalera p{color:var(--gris);font-size:1.15rem;margin-top:.6rem;font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500}

/* ---------- estructura d'apartats ---------- */
.bloc{max-width:1200px;margin:0 auto;padding:1.6rem 1.5rem}
.bloc-titol{display:flex;flex-direction:column;align-items:center;gap:.2rem;margin-bottom:1.1rem;text-align:center}
.bloc-titol .n{font-family:'Cinzel',serif;font-weight:500;font-size:.95rem;color:var(--gris);letter-spacing:.15em}
.bloc-titol h2{font-family:'Cinzel',serif;font-weight:700;font-size:1.9rem;letter-spacing:.08em;text-transform:uppercase}
.bloc-titol .ajuda{font-size:.9rem;color:var(--gris);font-weight:400;font-family:'Cormorant Garamond',serif;font-style:italic}

/* ---------- QUÈ: quadres de categoria (foto apaïsada, tota l'amplada) ---------- */
.bloc-que{padding-bottom:.6rem}
.categories{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;background:#fff;width:100%}
@media(max-width:760px){.categories{grid-template-columns:1fr}}
.cat{position:relative;aspect-ratio:1080/270;overflow:hidden;cursor:pointer;border:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  background-size:cover;background-position:center;background-color:#222;
  transition:transform .3s cubic-bezier(.2,.8,.2,1),box-shadow .3s}
.cat::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.46);transition:background .3s}
.cat:hover::after{background:rgba(0,0,0,.30)}
.cat .txt{position:relative;z-index:2;color:#fff;padding:0 1rem}
.cat .nom{font-family:'Cinzel',serif;font-weight:600;font-size:clamp(1.4rem,3vw,2.4rem);
  letter-spacing:.18em;text-transform:uppercase;line-height:1.1;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.cat .sub{font-family:'Outfit',sans-serif;font-weight:300;font-size:.82rem;letter-spacing:.05em;
  margin-top:.5rem;opacity:.92;text-shadow:0 1px 6px rgba(0,0,0,.6)}
.cat .check{position:absolute;top:.8rem;right:.8rem;z-index:3;width:30px;height:30px;border-radius:50%;
  background:#fff;color:var(--tint,#000);display:none;align-items:center;justify-content:center;font-weight:800}
.cat.actiu::after{background:color-mix(in srgb, var(--tint,#000) 55%, rgba(0,0,0,.45))}
.cat.actiu{box-shadow:inset 0 0 0 4px var(--tint,#000)}
.cat.actiu .check{display:flex}

/* ---------- QUAN: dates ---------- */
.dates{display:flex;gap:1.4rem;flex-wrap:wrap;justify-content:center}
.camp-data{display:flex;flex-direction:column;gap:.35rem}
.camp-data label{font-size:.82rem;color:var(--gris);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.camp-data input{font-family:'Outfit',sans-serif;font-size:1rem;padding:.7rem .9rem;border:1.5px solid var(--vora);
  border-radius:11px;background:var(--paper);color:var(--tinta);transition:border-color .2s}
.camp-data input:focus{outline:none;border-color:var(--c-literatura)}

/* ---------- ON: lloc ---------- */
.lloc-controls{display:flex;gap:.9rem;flex-wrap:wrap;align-items:center;justify-content:center}
.lloc-controls select{flex:1;min-width:200px;font-family:'Outfit',sans-serif;font-size:1rem;padding:.7rem .9rem;
  border:1.5px solid var(--vora);border-radius:11px;background:var(--paper);color:var(--tinta);cursor:pointer}
.lloc-controls select:focus{outline:none;border-color:var(--c-plastiques)}
.toggle-mapa{display:flex;gap:.3rem;background:var(--fons);border-radius:11px;padding:.3rem}
.toggle-mapa button{border:none;background:none;padding:.5rem .95rem;border-radius:8px;cursor:pointer;
  font-family:'Outfit',sans-serif;font-weight:600;font-size:.9rem;color:var(--gris);transition:all .2s}
.toggle-mapa button.actiu{background:var(--tinta);color:#fff}

/* ---------- cerca de text ---------- */
.cerca{max-width:1200px;margin:0 auto;padding:0 1.5rem}
.cerca input{width:100%;font-family:'Outfit',sans-serif;font-size:1.05rem;padding:.85rem 1.1rem;
  border:1.5px solid var(--vora);border-radius:13px;background:var(--paper)}
.cerca input:focus{outline:none;border-color:var(--c-musicals)}

/* ---------- resultats ---------- */
.barra-res{max-width:1200px;margin:1.2rem auto .4rem;padding:0 1.5rem;display:flex;align-items:baseline;gap:.6rem}
.barra-res .compte{font-family:'Cinzel',serif;font-weight:700;font-size:1.5rem}
.barra-res .et{color:var(--gris);font-weight:300}
.barra-res .netejar{margin-left:auto;background:none;border:none;color:var(--c-esceniques);font-weight:600;
  cursor:pointer;font-family:'Outfit',sans-serif;font-size:.9rem}

.vista{display:none;max-width:1200px;margin:0 auto;padding:1rem 1.5rem 4rem}
.vista.actiu{display:block}

.graella{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.3rem}
.targeta{background:var(--paper);border:1px solid var(--vora);border-radius:16px;overflow:hidden;
  transition:transform .22s,box-shadow .22s;cursor:pointer;display:flex;flex-direction:column}
.targeta:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.12)}
.targeta .foto{height:150px;background:var(--fons);background-size:cover;background-position:center;position:relative}
.targeta .etiq{position:absolute;left:.6rem;bottom:.6rem;color:#fff;font-weight:700;font-size:.78rem;
  padding:.25rem .6rem;border-radius:20px;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.targeta .cos{padding:.9rem 1rem 1.1rem;display:flex;flex-direction:column;gap:.4rem;flex:1}
.targeta .data{font-size:.8rem;font-weight:600;color:var(--c-musicals);text-transform:uppercase;letter-spacing:.03em}
.targeta h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.3rem;line-height:1.15}
.targeta .lloc{font-size:.86rem;color:var(--gris);margin-top:auto}
#mapa{height:560px;border-radius:16px;border:1px solid var(--vora)}
.estat{text-align:center;color:var(--gris);padding:3rem;font-weight:300}
.peu{text-align:center;color:var(--gris);font-size:.82rem;padding:2rem 1.5rem 3rem;font-weight:300}
</style>
</head>
<body>

<header class="capcalera">
  <h1>Agenda Cultural <em>de Catalunya</em></h1>
  <p>Descobreix què passa, quan i on</p>
</header>

<div class="cerca">
  <input id="f-text" type="text" placeholder="Cerca un acte, un artista, un tema…">
</div>

<!-- QUÈ -->
<section class="bloc bloc-que">
  <div class="bloc-titol"><span class="n">01</span><h2>Què</h2><span class="ajuda">Tria una o més categories</span></div>
</section>
<div class="categories" id="categories"></div>

<!-- QUAN -->
<section class="bloc">
  <div class="bloc-titol"><span class="n">02</span><h2>Quan</h2><span class="ajuda">Del primer al darrer dia</span></div>
  <div class="dates">
    <div class="camp-data"><label>Des del dia</label><input id="f-desde" type="date"></div>
    <div class="camp-data"><label>Fins al dia</label><input id="f-fins" type="date"></div>
  </div>
</section>

<!-- ON -->
<section class="bloc">
  <div class="bloc-titol"><span class="n">03</span><h2>On</h2><span class="ajuda">Comarca o municipi</span></div>
  <div class="lloc-controls">
    <select id="f-comarca"><option value="">Totes les comarques</option></select>
    <select id="f-municipi"><option value="">Tots els municipis</option></select>
    <div class="toggle-mapa">
      <button id="t-llista" class="actiu" data-vista="llista">Llista</button>
      <button id="t-mapa" data-vista="mapa">Mapa</button>
    </div>
  </div>
</section>

<div class="barra-res">
  <span class="compte" id="compte">…</span><span class="et" id="et-res">actes trobats</span>
  <button class="netejar" id="netejar">Esborrar filtres</button>
</div>

<div class="vista actiu" id="v-llista">
  <div class="graella" id="graella"></div>
  <div class="estat" id="estat-llista"></div>
</div>
<div class="vista" id="v-mapa"><div id="mapa"></div></div>

<footer class="peu">Dades obertes de la Generalitat de Catalunya · Agenda Cultural</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ---- CONFIGURACIÓ SUPABASE ----
const SUPABASE_URL = "https://gdxucdxoclgrcjtciggs.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkeHVjZHhvY2xncmNqdGNpZ2dzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDg1MTksImV4cCI6MjA5NTcyNDUxOX0.DSsGzop1xXmMY1ztYTr9cPWOi_KPcRZN0ze_rP5pYqs";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const $ = s => document.querySelector(s);
const ordreCatala = new Intl.Collator('ca');

// ---- definició visual de les 8 categories ----
// catBD = nom EXACTE a la base de dades · etiqueta = text del botó · sub = subtítol · img = fitxer
const CATS = [
  {catBD:"Arts escèniques", etiqueta:"Teatre", sub:"teatre · dansa · circ · màgia · titelles", color:"var(--c-esceniques)", img:"imatges/esceniques.jpg"},
  {catBD:"Arts musicals",   etiqueta:"Música",   sub:"clàssica · jazz · blues · rock · pop", color:"var(--c-musicals)", img:"imatges/musicals.jpg"},
  {catBD:"Arts plàstiques", etiqueta:"Exposicions",     sub:"fotografia · pintura · escultura", color:"var(--c-plastiques)", img:"imatges/plastiques.jpg"},
  {catBD:"Cultura popular", etiqueta:"Cultura popular", sub:"festes majors · correfocs · castellers", color:"var(--c-popular)", img:"imatges/popular.jpg"},
  {catBD:"Literatura",      etiqueta:"Conferències",    sub:"recitals de poesia · conferències", color:"var(--c-literatura)", img:"imatges/literatura.jpg"},
  {catBD:"Cinema",          etiqueta:"Cinema",          sub:"pel·lícules a la fresca · cicles temàtics", color:"var(--c-cinema)", img:"imatges/cinema.jpg"},
  {catBD:"Formació",        etiqueta:"Formació",        sub:"cursos · seminaris · tallers", color:"var(--c-formacio)", img:"imatges/formacio.jpg"},
  {catBD:"Altres",          etiqueta:"Altres",          sub:"", color:"var(--c-altres)", img:"imatges/altres.jpg"},
];
const colorCat = {};        // nom BD -> color
const idCat = {};           // nom BD -> id (de la BD)
const seleccionades = new Set();   // ids de categories premudes

// ---- pintar els quadres de categoria ----
async function pintaCategories(){
  // agafar els ids reals de la BD
  const {data} = await sb.from("categories").select("id,nom");
  (data||[]).forEach(c=>idCat[c.nom]=c.id);

  const cont = $("#categories");
  cont.innerHTML = "";
  CATS.forEach(c=>{
    colorCat[c.catBD]=c.color;
    const id = idCat[c.catBD];
    const b = document.createElement("button");
    b.className="cat";
    b.style.setProperty("--tint", c.color);
    b.style.backgroundImage = `url('${c.img}')`;
    b.innerHTML = `<div class="txt"><div class="nom">${c.etiqueta}</div>`
                + (c.sub?`<div class="sub">${c.sub}</div>`:"")
                + `</div><span class="check">✓</span>`;
    b.onclick = ()=>{
      if(!id) return;
      if(seleccionades.has(id)){seleccionades.delete(id);b.classList.remove("actiu")}
      else{seleccionades.add(id);b.classList.add("actiu")}
      carregaActes();
    };
    cont.appendChild(b);
  });
}

// ---- omplir comarca i municipi ----
async function carregaFiltres(){
  const {data: coms} = await sb.from("comarques").select("id,nom").order("nom");
  if(coms){
    coms.sort((a,b)=>ordreCatala.compare(a.nom,b.nom)).forEach(c=>{
      const o=document.createElement("option");o.value=c.id;o.textContent=c.nom;$("#f-comarca").appendChild(o);
    });
  }
  const {data: muns} = await sb.from("municipis").select("id,nom").order("nom");
  if(muns){
    muns.sort((a,b)=>ordreCatala.compare(a.nom,b.nom)).forEach(m=>{
      const o=document.createElement("option");o.value=m.id;o.textContent=m.nom;$("#f-municipi").appendChild(o);
    });
  }
}

// ---- utilitats ----
function fmtData(d){
  if(!d) return "Data per confirmar";
  const x=new Date(d);
  return x.toLocaleDateString('ca-ES',{weekday:'long',day:'numeric',month:'long'});
}
function nomMunicipi(a){return (a.municipis&&a.municipis.nom)?a.municipis.nom:""}
function categoriesActe(a){
  const c=new Set();
  (a.acte_subcategories||[]).forEach(x=>{
    if(x.subcategories&&x.subcategories.categories&&x.subcategories.categories.nom)
      c.add(x.subcategories.categories.nom);
  });
  return [...c];
}

let mapa, capaMarcadors;

// ---- carregar actes ----
async function carregaActes(){
  $("#estat-llista").textContent="Carregant…";

  const cats = [...seleccionades];
  // si hi ha categories seleccionades, fem el join INTERN cap a les subcategories
  // (filtra dins la mateixa consulta, sense el límit de 1000 ids)
  const sel = cats.length
    ? "*, municipis(nom), acte_subcategories!inner(subcategories!inner(nom, categoria_id, categories(nom)))"
    : "*, municipis(nom), acte_subcategories(subcategories(nom, categories(nom)))";

  let q = sb.from("actes").select(sel).order("data_inici",{ascending:true}).limit(2000);

  const text = $("#f-text").value.trim();
  const comarca = $("#f-comarca").value;
  const municipi = $("#f-municipi").value;
  const desde = $("#f-desde").value;
  const fins = $("#f-fins").value;

  if(text) q = q.or(`nom.ilike.%${text}%,descripcio.ilike.%${text}%`);
  if(municipi) q = q.eq("municipi_id", municipi);
  if(comarca) q = q.eq("comarca_id", comarca);
  if(desde) q = q.gte("data_inici", desde);
  if(fins) q = q.lte("data_inici", fins);

  // filtre per categories: sobre la taula relacionada, dins la mateixa consulta
  if(cats.length){
    q = q.in("acte_subcategories.subcategories.categoria_id", cats);
  }

  const {data, error} = await q;
  if(error){$("#estat-llista").textContent="Error carregant les dades: "+error.message;return}

  // amb !inner i diverses subcategories, un acte pot sortir repetit -> dedupliquem
  const vistos = new Set();
  const actes = (data||[]).filter(a=>{ if(vistos.has(a.id))return false; vistos.add(a.id); return true; });

  $("#compte").textContent = actes.length;
  $("#et-res").textContent = actes.length===1?"acte trobat":"actes trobats";
  pintaLlista(actes);
  pintaMapa(actes);
  $("#estat-llista").textContent = actes.length?"":"No s'han trobat actes amb aquests filtres.";
}

// ---- llista ----
function pintaLlista(actes){
  const g=$("#graella");g.innerHTML="";
  actes.forEach(a=>{
    const cats=categoriesActe(a);
    const cat=cats[0]||"";
    const color=colorCat[cat]||"var(--c-altres)";
    const foto=a.imatge?`style="background-image:url('${a.imatge}')"`:"";
    const t=document.createElement("article");
    t.className="targeta";
    t.innerHTML=`
      <div class="foto" ${foto}>${cat?`<span class="etiq" style="background:${color}">${cat}</span>`:""}</div>
      <div class="cos">
        <div class="data">${fmtData(a.data_inici)}</div>
        <h3>${a.nom||"Acte sense títol"}</h3>
        <div class="lloc">📍 ${[a.lloc_nom,nomMunicipi(a)].filter(Boolean).join(", ")||"Lloc per confirmar"}</div>
      </div>`;
    t.onclick=()=>{if(a.url_original)window.open(a.url_original,"_blank")};
    g.appendChild(t);
  });
}

// ---- mapa ----
function pintaMapa(actes){
  if(!mapa){
    mapa=L.map('mapa').setView([41.7,1.7],8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(mapa);
    capaMarcadors=L.layerGroup().addTo(mapa);
  }
  capaMarcadors.clearLayers();
  actes.forEach(a=>{
    if(a.latitud&&a.longitud){
      L.marker([a.latitud,a.longitud]).addTo(capaMarcadors)
        .bindPopup(`<b>${a.nom||""}</b><br>${fmtData(a.data_inici)}<br>${[a.lloc_nom,nomMunicipi(a)].filter(Boolean).join(", ")}`);
    }
  });
}

// ---- interacció ----
document.querySelectorAll(".toggle-mapa button").forEach(b=>b.onclick=()=>{
  document.querySelectorAll(".toggle-mapa button").forEach(x=>x.classList.remove("actiu"));
  b.classList.add("actiu");
  document.querySelectorAll(".vista").forEach(v=>v.classList.remove("actiu"));
  $("#v-"+b.dataset.vista).classList.add("actiu");
  if(b.dataset.vista==="mapa"&&mapa) setTimeout(()=>mapa.invalidateSize(),100);
});

let temp;
["#f-text","#f-comarca","#f-municipi","#f-desde","#f-fins"].forEach(s=>{
  const el=$(s);const ev=(el.tagName==="INPUT"&&el.type==="text")?"input":"change";
  el.addEventListener(ev,()=>{clearTimeout(temp);temp=setTimeout(carregaActes,350)});
});

$("#netejar").onclick=()=>{
  $("#f-text").value="";$("#f-comarca").value="";$("#f-municipi").value="";
  $("#f-desde").value="";$("#f-fins").value="";
  seleccionades.clear();
  document.querySelectorAll(".cat").forEach(c=>c.classList.remove("actiu"));
  carregaActes();
};

// ---- arrencada ----
(async()=>{
  await pintaCategories();
  await carregaFiltres();
  carregaActes();
})();
</script>
</body>
</html>
